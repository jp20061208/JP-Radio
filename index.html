<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP-Radio 本地音乐播放器 | 官方更新站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 全局换用现代无衬线字体，更有科技感 */
            font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* 开屏层 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* 开屏Logo：上浮淡入 + 呼吸发光 */
        .splash-logo {
            font-size: 3.2rem;
            color: #ffffff;
            letter-spacing: 0.4rem;
            margin-bottom: 1rem;
            font-weight: 300;
            /* 先执行上浮淡入，再执行呼吸动画 */
            animation: floatUp 1.5s ease forwards, glow 2s infinite ease-in-out 1.5s;
            opacity: 0;
            transform: translateY(20px);
        }

        .splash-subtitle {
            font-size: 0.9rem;
            color: #666666;
            opacity: 0;
            /* 延迟淡入，营造层次感 */
            animation: fadeIn 1s ease forwards 0.5s;
        }

        .splash-version {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            color: #666666;
            font-size: 0.8rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.8s;
        }

        /* 上浮淡入动画 */
        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 呼吸发光动画 */
        @keyframes glow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(29, 185, 84, 0.3), 0 0 20px rgba(29, 185, 84, 0.3);
            }
            50% { 
                text-shadow: 0 0 20px rgba(29, 185, 84, 0.6), 0 0 40px rgba(29, 185, 84, 0.4);
            }
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.5; }
        }

        /* 主页面 */
        #main-content {
            max-width: 800px;
            width: 100%;
            text-align: center;
            display: none;
        }

        .header {
            margin-bottom: 3rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            background-color: #1db954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 4rem;
            color: #000;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .version-tag {
            background-color: #1db954;
            color: #000;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
        }

        .subtitle {
            color: #b3b3b3;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        .download-section {
            background-color: #0a0a0a;
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid #282828;
        }

        .download-btn {
            background-color: #1db954;
            color: #000;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 1.5rem;
        }

        .download-btn:hover {
            background-color: #1ed760;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .feature-card {
            background-color: #0a0a0a;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #282828;
        }

        .feature-icon {
            font-size: 2rem;
            color: #1db954;
            margin-bottom: 1rem;
        }

        h3 {
            margin-bottom: 0.5rem;
        }

        p {
            color: #b3b3b3;
            line-height: 1.6;
        }

        .footer {
            margin-top: auto;
            padding-top: 3rem;
            color: #666666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 开屏动画层 -->
    <div id="splash-screen">
        <div class="splash-logo">JP Radio</div>
        <div class="splash-subtitle">Audio Render Engine Loading...</div>
        <div class="splash-version">v0.1.0</div>
    </div>

    <!-- 主页面内容 -->
    <div id="main-content">

        <div class="download-section">

            <a href="https://pan.quark.cn/s/41a8f8f0896f">下载 JP-Radio v0.2.0 </a>
    
            </a>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🎵</div>

            </div>
            <div class="feature-card">
                <div class="feature-icon">🔊</div>
                <h3>后台运行</h3>
                <p>托盘常驻，不中断播放，不占用你的桌面空间。</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">⚡</div>
                <h3>轻量免装</h3>
                <p>绿色免安装版，解压即用，不写注册表，不占系统资源。</p>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 JP-Radio | 所有音乐均为本地播放，不存储任何用户数据</p>
        </div>
    </div>

    <script>
        window.onload = function() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');

            setTimeout(() => {
                splash.style.transition = 'opacity 1s ease';
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'block';
                }, 1000);
            }, 3000);
        };
    </script>
</body>
</html>
